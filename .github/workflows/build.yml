name: SE350 Engine Build

on:
  push:
    branches:
      - main
      - sprint3
  pull_request:
    branches: 
      - main
      - sprint3

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libpulse-dev libwayland-dev \
                                libxkbcommon-dev \
                                xorg-dev

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release
