name: build and test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # We only need Java 21 since that is what your pom.xml requires
    strategy:
      matrix:
        java-version: [ 21 ]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # 'adopt' was deprecated and rebranded to 'temurin'
          java-version: ${{ matrix.java-version }}
          
      - name: Run Maven Tests
        # 'clean test' specifically runs your JUnit tests without packaging the whole jar
        run: mvn -B clean test --no-transfer-progress

  coverage:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          
      - name: Run Verify for Coverage
        run: mvn -B verify --no-transfer-progress

      - uses: codecov/codecov-action@v4
        with:
          file: ./**/target/site/jacoco/jacoco.xml
          name: codecov
          # Note: Codecov v4 requires a token for public repos. 
          # If this fails, add: token: ${{ secrets.CODECOV_TOKEN }}